kind = "mobile"
previewPath = "/"
title = "Social Scheduler"
version = "1.0.0"
id = "artifacts/social-scheduler"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19789

[services.development]
run = "pnpm --filter @workspace/social-scheduler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-scheduler", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/social-scheduler", "run", "serve" ]

[services.env]
PORT = "19789"
BASE_PATH = "/"
